<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changelog February 2026 - superinsights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Geist', system-ui, sans-serif; background-color: #050505; color: #e2e8f0; }
      .tab-btn { transition: all 0.3s cubic-bezier(0.32,0.72,0,1); }
      .tab-btn.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.4); color: #818cf8; }
      .tab-content { display: none; animation: fadeIn 0.4s cubic-bezier(0.32,0.72,0,1); }
      .tab-content.active { display: block; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .feature-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; padding: 1.5px; transition: all 0.4s cubic-bezier(0.32,0.72,0,1); }
      .feature-card:hover { border-color: rgba(99,102,241,0.3); transform: translateY(-2px); }
      .feature-card-inner { background: rgba(10,10,12,0.9); border-radius: calc(1.5rem - 1.5px); padding: 1.5rem; box-shadow: inset 0 1px 1px rgba(255,255,255,0.06); }
      .commit-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1rem; padding: 1px; transition: all 0.3s cubic-bezier(0.32,0.72,0,1); }
      .commit-card:hover { border-color: rgba(255,255,255,0.12); }
      .commit-card-inner { background: rgba(10,10,12,0.9); border-radius: calc(1rem - 1px); padding: 0.75rem 1rem; }
    </style>
  </head>
  <body class="bg-[#050505] min-h-screen" style="background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.08), transparent);">
    <div class="max-w-5xl mx-auto px-6 py-24">
      <header class="mb-16">
        <a href="changelog.html" class="inline-flex items-center gap-1 text-sm text-white/30 hover:text-white/70 mb-6 transition-colors"><span class="text-xs">&larr;</span> Back to Changelog</a>
        <h1 class="text-5xl font-bold text-white mt-4 tracking-tight">Changelog</h1>
        <p class="text-white/40 mt-3 text-lg">February 2026</p>
        <div class="flex gap-2 mt-8">
          <button onclick="switchTab('product')" id="tab-product" class="tab-btn active px-5 py-2.5 rounded-lg border border-white/10 text-white/70 font-medium text-sm hover:border-white/20">Product</button>
          <button onclick="switchTab('technical')" id="tab-technical" class="tab-btn px-5 py-2.5 rounded-lg border border-white/10 text-white/40 font-medium text-sm hover:border-white/20">Technical</button>
        </div>
      </header>

      <div id="content-product" class="tab-content active">
        <div class="feature-card"><div class="feature-card-inner">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-lg bg-red-500/10 flex items-center justify-center flex-shrink-0">
              <span class="text-2xl">🔗</span>
            </div>
            <div>
              <h3 class="text-xl font-semibold text-white mb-2">CORS origin whitelist</h3>
              <p class="text-slate-400 leading-relaxed">Configurable CORS to allow specific origins for API requests. Enables secure cross-origin ingestion from specific domains while blocking others.</p>
            </div>
          </div>
        </div></div>
      </div>

      <div id="content-technical" class="tab-content">
        <div class="space-y-6">
          <div>
            <h2 class="text-lg font-semibold text-white mb-4 flex items-center gap-2"><span class="text-2xl">🚀</span> Features</h2>
            <div class="space-y-2">
              <div class="commit-card"><div class="commit-card-inner flex items-center gap-3">
                <span class="text-sm text-white/80">feat: Allow specific origins for CORS requests</span>
              </div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
        document.querySelectorAll('.tab-btn').forEach(function(el) { el.classList.remove('active'); });
        document.getElementById('content-' + tab).classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
      }
    </script>
  </body>
</html>
