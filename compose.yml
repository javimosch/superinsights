version: "3.9"

services:
  app:
    container_name: superinsights
    image: javimosch/superinsights:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    working_dir: /app
    expose:
      - "3000"
    env_file:
      - ./.env.staging
    command: ["node", "index.js"]
    networks:
      - coolify-shared
    volumes:
      - ./:/app
      - /app/node_modules
    restart: always
    pull_policy: always
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/readyz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  coolify-shared:
    external: true
